services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: finrag
      POSTGRES_USER: finrag
      POSTGRES_PASSWORD: finrag
    ports:
      - "5432:5432"
    volumes:
      - finrag-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finrag -d finrag"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: finrag
      DB_USER: finrag
      DB_PASSWORD: finrag
    ports:
      - "8080:8080"

volumes:
  finrag-db-data:
