spring:
  application:
    name: finrag
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:finrag}
    username: ${DB_USER:finrag}
    password: ${DB_PASSWORD:finrag}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

finrag:
  jwt:
    secret: ${JWT_SECRET}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
